<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="IMS566 static student productivity dashboard prototype for academic monitoring, tasks, and class records.">
    <title>Login | Student Productivity Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script>
</head>
<body class="login-body simple-login">
    <main class="simple-login-card" aria-label="Student portal login">
        <div class="login-icon" aria-hidden="true">
            <span class="material-symbols-rounded">school</span>
        </div>
        <h1>Student Portal</h1>
        <p class="login-subtitle">Academic & Co-Curricular Monitoring System</p>

        <form onsubmit="event.preventDefault(); login();" class="login-form">
            <div class="form-group">
                <label class="form-label" for="username">User ID</label>
                <input class="form-control" id="username" name="username" autocomplete="username" placeholder="student123" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="password">Password</label>
                <input class="form-control" id="password" name="password" type="password" autocomplete="current-password" placeholder="12345" required>
            </div>
            <p id="error" class="error-text" role="alert" aria-live="polite"></p>
            <button class="btn btn-primary w-100" type="submit">Log In</button>
        </form>

        <div class="login-divider"></div>
        <p class="register-line">New account? <a href="register.html">Register Here</a></p>
    </main>
</body>
</html>
