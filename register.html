<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Static registration form prototype for EduTrack.">
    <title>Register | EduTrack</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Rounded:opsz,wght,FILL,GRAD@24,500,1,0" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <script defer src="js/script.js"></script>
</head>
<body class="login-body simple-login">
    <main class="simple-login-card" aria-label="Registration prototype">
        <div class="login-icon" aria-hidden="true">
            <span class="material-symbols-rounded">person_add</span>
        </div>
        <h1>EduTrack Registration</h1>
        <p class="login-subtitle">Organize Your Academic Journey</p>

        <form onsubmit="registerDemoAccount(event)" class="login-form">
            <div class="form-group">
                <label class="form-label" for="fullName">Full Name</label>
                <input class="form-control" id="fullName" required placeholder="Ali bin Abu">
            </div>
            <div class="form-group">
                <label class="form-label" for="studentId">Student ID</label>
                <input class="form-control" id="studentId" required placeholder="SMK-2026-001">
            </div>
            <div class="form-group">
                <label class="form-label" for="className">Class</label>
                <input class="form-control" id="className" required placeholder="2 Amanah">
            </div>
            <div class="form-group">
                <label class="form-label" for="preferredPassword">Password</label>
                <input class="form-control" id="preferredPassword" type="password" required minlength="4">
            </div>
            <p id="registerNotice" class="error-text" role="status" aria-live="polite"></p>
            <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>

        <div class="login-divider"></div>
        <p class="register-line"><a href="index.html">Back to Login</a></p>
    </main>
</body>
</html>
